<!DOCTYPE html>
    <head>
        <title>Lists In HTML</title>
    </head>
    <body>
        <h1>Ordered Lists</h1>
        <ol>
            <li>Wake Up</li>
            <li>Get Ready For School</li>
            <li>Go To School</li>
        </ol>
        <h2>Unordered Lists</h2>
        <ul>
            <li>Come Home</li>
            <li>Chill</li>
            <li>Do Work</li>
        </ul>
        <h3>Definition List</h3>
        <dl>
            <dt>Walking</dt>
            <dd>A Repeated Process Of Nearly Falling But Catching Yourself With Your Legs</dd>
        </dl>
    </body>
</html>
