<!DOCTYPE html>
<html>
    <head>
        <title>Forms In Html</title>
    </head>
    <Body>
        <h1>Personal Details</h1>
<form>
    <label>Name</label><br>
    <input type="text" id ="name"><br><br>

    <label>Email Id</label><br>
    <input type="email" id="email"><br><br>

    <label>Contact Phone Number</label><br>
    <input type="password" id="contact"><br><br>

    <label>Gender</label><br>
    <input type="radio" id="female" name="gender" value="Female"> Female <br>
    <input type="radio" id="male" name="gender" value="male"> Male <br><br>

    <label>Favourite City</label><br>
    <input type="checkbox" id="city" value="littleover">Chesterfield<br><br>
    <input type="checkbox" id="city" value="matlock"> Buxton<br><br>

</form>
    </Body>
</html>
